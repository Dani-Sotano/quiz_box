<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pfad</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #e9efe6;
      --bg2: #f7f9f5;
      --card: rgba(255,255,255,0.75);
      --text: #1f2a1f;
      --muted: #6b7a6b;
      --accent: #4f7c5a;
      --error: #b24a3f;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      transition: background 0.6s ease, filter 0.6s ease;
      cursor: pointer;
    }

    .card {
      width: 340px;
      padding: 26px;
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      outline: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    .message {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
    }

    .error {
      color: var(--error);
    }

    #link {
      display: none;
      margin-top: 14px;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    #link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Lösungsversuch</h1>
  <p>Wo alles begann...</p>

  <input id="input" placeholder="Lösungswort..." />
  <button onclick="check()">Prüfen</button>

  <div id="msg" class="message"></div>

  <a id="link" target="_blank">→ Weitergehen</a>
</div>

<script>
  // 🔐 solution
  const solution = "inzell";

  // 🎯 destination
  const targetURL = "https://dani-sotano.github.io/quiz_box/landkarte.html";

  let darkness = 0;

  function applyDarkness() {
    const intensity = darkness * 0.12;

    document.body.style.background =
      `linear-gradient(180deg,
      rgb(${233 - intensity*100}, ${239 - intensity*100}, ${230 - intensity*100}),
      rgb(${247 - intensity*100}, ${249 - intensity*100}, ${245 - intensity*100}))`;

    document.body.style.filter = `brightness(${1 - darkness * 0.08})`;
  }

  function check() {
    const val = document.getElementById("input").value.trim().toLowerCase();
    const msg = document.getElementById("msg");
    const link = document.getElementById("link");

    if (val === solution) {
      msg.textContent = "Du hast den Weg gefunden.";
      msg.className = "message";

      link.href = targetURL;
      link.style.display = "inline-block";

      darkness = 0;
      applyDarkness();

    } else {
      msg.textContent = "Du verlierst die Orientierung.";
      msg.className = "message error";

      if (darkness < 6) darkness++;
      applyDarkness();

      link.style.display = "none";
    }
  }

  // 👆 click = regain clarity
  document.body.addEventListener("click", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON") return;

    if (darkness > 0) {
      darkness--;
      applyDarkness();
    }
  });

  applyDarkness();
</script>

</body>
</html>
