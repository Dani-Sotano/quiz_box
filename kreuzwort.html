<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gate</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #e9efe6;
      --bg2: #f7f9f5;
      --card: rgba(255,255,255,0.75);
      --text: #1f2a1f;
      --muted: #6b7a6b;
      --accent: #4f7c5a;
      --error: #b24a3f;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      transition: background 0.6s ease, filter 0.6s ease;
      cursor: pointer;
    }

    .card {
      width: 340px;
      padding: 26px;
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      transition: all 0.4s ease;
    }

    h1 { font-size: 18px; margin-bottom: 6px; }
    p { font-size: 13px; color: var(--muted); }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      outline: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    .message {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
    }

    .error { color: var(--error); }

    #qrcode {
      margin-top: 16px;
      display: flex;
      justify-content: center;

      opacity: 0;
      transform: scale(0.8);
      transition: all 0.8s ease;
    }

    #qrcode.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Pfadprüfung</h1>
  <p>Klick die Umgebung, um dich zu orientieren</p>

  <input id="input" placeholder="Lösungswort..." />
  <button onclick="check()">Prüfen</button>

  <div id="msg" class="message"></div>

  <div id="qrcode"></div>
</div>

<script>
  const solution = "inzell";
  const targetURL = "https://dani-sotano.github.io/quiz_box/landkarte.html";

  let darkness = 0; // 0 = clear, 5 = very dark
  let qrCreated = false;

  function applyDarkness() {
    const intensity = darkness * 12;

    document.body.style.background =
      `linear-gradient(180deg,
      rgb(${233 - intensity}, ${239 - intensity}, ${230 - intensity}),
      rgb(${247 - intensity}, ${249 - intensity}, ${245 - intensity}))`;

    document.body.style.filter = `brightness(${1 - darkness * 0.08})`;
  }

  function check() {
    const val = document.getElementById("input").value.trim().toLowerCase();
    const msg = document.getElementById("msg");
    const qr = document.getElementById("qrcode");

    if (val === solution) {
      msg.textContent = "Du hast den Weg gefunden.";
      msg.className = "message";

      if (!qrCreated) {
        new QRCode(qr, {
          text: targetURL,
          width: 180,
          height: 180
        });
        qrCreated = true;
      }

      setTimeout(() => qr.classList.add("show"), 80);
      darkness = 0;
      applyDarkness();

    } else {
      msg.textContent = "Du verlierst die Orientierung.";
      msg.className = "message error";

      // progressive darkness instead of instant change
      if (darkness < 5) darkness++;
      applyDarkness();
    }
  }

  // Click = regain clarity (important mechanic)
  document.body.addEventListener("click", (e) => {
    // don't trigger when clicking input/button
    if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON") return;

    if (darkness > 0) {
      darkness--;
      applyDarkness();
    }
  });

  applyDarkness();
</script>

</body>
</html>
